<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>modo</title>
    <link rel="stylesheet" href="./assets/css/pages/modo/modo.css" />
  </head>
  <body>
    <div class="logo">
      <img src="./assets/img/logo2UPX.png" alt="logo" />
    </div>
    <div class="subtitle">
      <h2>Selecione o seu modo de jogo</h2>
    </div>
    <div class="container_card">
      <div class="card1">
        <div class="card1-img">
          <img
            src="./assets/img/Livro mágico e brilhante .png"
            alt="livro mágico e brilhante"
          />
        </div>
        <div class="card1-title">
          <h3>Modo Estudo</h3>
        </div>
        <div class="card1-text">
          <p>
            Aprenda os conceitos básicos. Sem pressa, sem pontos. Comece sua
            jornada.
          </p>
        </div>
        <div class="card1-button">
          <a href="">
            <button>Estudar</button>
          </a>
        </div>
      </div>
      <div class="card2">
        <div class="card2-img">
          <img
            src="./assets/img/Ícone de usuário iluminado .png"
            alt="ícone de usuário iluminado"
          />
        </div>
        <div class="card2-title">
          <h3>Modo Solo</h3>
        </div>
        <div class="card2-text">
          <p>
            Enfrente o Quiz, complete desafios e acumule pontos e conquistas
          </p>
        </div>
        <div class="card2-button">
          <a href="">
            <button>Jogar</button>
          </a>
        </div>
      </div>
      <div class="card3">
        <div class="card3-img">
          <img
            src="./assets/img/Ícones humanos estilizados e brilhantes .png"
            alt="icones humanos estilizados e brilhantes"
          />
        </div>
        <div class="card3-title">
          <h3>Modo multiplayer</h3>
        </div>
        <div class="card3-text">
          <p>
            Desafie seus companheiros e desafie seus amigos para ver quem sabe
            mais
          </p>
        </div>
        <div class="card3-button">
          <a href="">
            <button>Desafie</button>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
